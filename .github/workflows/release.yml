name: 发布 Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: 构建并发布
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 运行测试（失败则中止发布）
        run: npm test

      - name: 生成图标与复制依赖库
        run: npm run setup

      - name: 打包插件
        run: npm run build

      - name: 创建 GitHub Release 并上传 ZIP
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
